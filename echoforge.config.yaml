        Crisis:  1.75
      min_consensus_pct:           60
      vpin_crisis_threshold:       0.85
      vpin_highvol_threshold:      0.50
      vpin_hysteresis:             0.08
      guardian_mode:               "active"
      conflict_position_threshold: 0.25
      conflict_window_ms:          5000
      direction_lock_ms:           15000
      jury_entropy_threshold:      0.40
      mesh_heat_threshold:         0.80
      house_money_threshold:       100
      house_lock_frac:             0.50
      rolling_sharpe_floor:        -0.7
      max_crisis_threshold:        0.90
      strain_nack_threshold:       0.60
      strain_cooldown_min:         5
      reduce_only_lowvol_frac:     0.25
      reduce_only_flat_dwell_sec:  30
      regime_dwell_min:            5
      freeze_recovery_dwell_min:   15
      freeze_recovery_slip_pct:    1.0
      freeze_recovery_warmup_min:  10
      sl_circuit_breaker_n:        2
      sl_circuit_breaker_window_min: 30
      dca_aliveness_floor:         0.80
      post_crisis_buy_freeze_ms:   300000
      session_start_warmup_min:    3
      vetoed_patterns:
        - WHALE_WAKE
        - DEPTH_GRAB
      signal_boost:                0.03
      paper_shadow_alpha:          0.10
      paper_min_trades:            4
      macro_enabled:               true
      hurst_trending_threshold:    0.55
      hurst_reverting_threshold:   0.45
      hurst_window_min:            8
      cvd_lookback_min:            240
      cvd_divergence_threshold:    0.15
      depth_thin_pct:              0.50
      depth_window_h:              24
      correlation_depeg_threshold: 0.40
      correlation_window_h:        1
      macro_kelly_thin_scale:      0.50
      # Vault Governor — balanced: requires two independent signals (score 3)
      vault_enabled:               true
      vault_vpin_threshold:        0.85
      vault_compromise_score:      3
      vault_dwell_min:             15
      vault_flat_dwell_min:        3      # flat position: 3-min confirmation before re-entry
      drought_threshold_min:       5      # 5-min buy drought triggers half-size re-entry
      drought_reentry_size:        0.50   # start at 50% size after freeze

