# EchoForge configuration — single source of truth for all PHIC preset values.
#
# Active preset is selected by the ECHOFORGE_PHIC_PRESET env var (default: medium).
# Individual fields can be overridden on top of the preset via ECHOFORGE_PHIC_<FIELD>=<json-value>.
# Field overrides take precedence over the preset but are still overridden by localStorage on the browser.
#
# All services (bridge, dashboard, browser, daemon) read from this file via the bridge API:
#   GET /api/v1/phic/presets  — returns all three preset definitions
#   GET /api/v1/phic/config   — returns the currently active config
#   POST /api/v1/phic/config  — update + broadcast to all connected clients
#
# When this file changes, restart the bridge — all clients re-fetch on reconnect.

phic_presets:

  # ── low: 24h Safe Mode ────────────────────────────────────────────────────
  # Unattended capital preservation. Smallest positions, active Guardian,
  # REVERSION_A and SPREAD_FADE vetoed (confirmed low win-rate patterns).
  # vpin_crisis_threshold 0.72: session 7c4a8bac showed old 0.65 caused 1,272
  # regime flips (mean gap 45s) — too noisy for stable pattern execution.
  low:
    label: "Safe"
    hint: "24h mode — smallest positions, active Guardian, REVERSION_A + SPREAD_FADE vetoed"
    config:
      autonomy_level:              0.55
      max_position_pct:            5
      max_drawdown_pct:            4
      drawdown_hysteresis_n:       2
      max_pattern_exposure_pct:    0.10
      max_total_exposure_pct:      0.15
      stop_loss_pct:               1.0
      stop_loss_sell_frac:         0.75
      stop_loss_buy_freeze_ms:     600000
      cap_trim_buy_freeze_ms:      300000
      stop_loss_reentry_buffer:    0.015
      kelly_payoff_ratio:          1.3
      bank_profit_threshold_pct:   0.008
      bank_tier1_frac:             0.75
      bank_profit_dwell_min:       3
      inference_fidelity:          0.70
      correlation_enabled:         true
      rvr_threshold:               2.0
      pearson_threshold:           0.50
      cross_pair_boost:            0.02
      regime_caps:
        LowVol:  0.5
        HighVol: 0.5
        Crisis:  0.05
      hurdle_regime_scale:
        LowVol:  0.90
        HighVol: 1.10
        Crisis:  2.50
      min_consensus_pct:           70
      vpin_crisis_threshold:       0.72
      vpin_highvol_threshold:      0.40
      vpin_hysteresis:             0.08
      guardian_mode:               "active"
      conflict_position_threshold: 0.30
      conflict_window_ms:          5000
      direction_lock_ms:           15000
      jury_entropy_threshold:      0.30
      mesh_heat_threshold:         0.70
      house_money_threshold:       30
      house_lock_frac:             0.70
      rolling_sharpe_floor:        -0.3
      max_crisis_threshold:        0.85
      strain_nack_threshold:       0.50
      strain_cooldown_min:         10
      reduce_only_lowvol_frac:     0
      reduce_only_flat_dwell_sec:  60
      regime_dwell_min:            5
      freeze_recovery_dwell_min:   20
      freeze_recovery_slip_pct:    0.5
      freeze_recovery_warmup_min:  15
      sl_circuit_breaker_n:        2
      sl_circuit_breaker_window_min: 30
      dca_aliveness_floor:         0.85
      post_crisis_buy_freeze_ms:   600000
      session_start_warmup_min:    5
      vetoed_patterns:
        - REVERSION_A
        - SPREAD_FADE
        - WHALE_WAKE
      signal_boost:                0.03
      paper_shadow_alpha:          0.10
      paper_min_trades:            4
      macro_enabled:               true
      hurst_trending_threshold:    0.55
      hurst_reverting_threshold:   0.45
      hurst_window_min:            8
      cvd_lookback_min:            240
      cvd_divergence_threshold:    0.15
      depth_thin_pct:              0.60
      depth_window_h:              24
      correlation_depeg_threshold: 0.40
      correlation_window_h:        1
      macro_kelly_thin_scale:      0.50
      # Vault Governor — low risk: two signals required (bearish CVD + any, or VPIN crisis + any)
      vault_enabled:               true
      vault_vpin_threshold:        0.80
      vault_compromise_score:      2
      vault_dwell_min:             20
      vault_flat_dwell_min:        5      # flat position: shorter dwell before re-entry permitted
      drought_threshold_min:       3      # smaller drought window — safe mode exits faster
      drought_reentry_size:        0.40   # start at 40% size after freeze

  # ── medium: Balanced ──────────────────────────────────────────────────────
  # Good risk-adjusted returns, active Guardian, all patterns active.
  # Calibrated from session 7c4a8bac (967 min, 1,936 executed trades).
  medium:
