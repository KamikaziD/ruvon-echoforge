# EchoForge Docker Compose
#
# Containerised services: NATS · mock-valr · tracker · dashboard (optional)
# The Bun daemon (runner.js) and browser server run locally via start.sh —
# they need direct filesystem access to browser/ workers and models/.
#
# Usage:
#   docker compose up                      # NATS + mock-valr + tracker
#   docker compose --profile full up       # + dashboard
#   docker compose stop
#
# Env overrides (.env file or shell):
#   MOCK_VALR_PORT=8766
#   TRACKER_PORT=8888
#   NATS_PORT=4222
#   DASHBOARD_PORT=3001

services:

  # ── NATS JetStream (telemetry backbone) ────────────────────────────────
  nats:
    image: nats:2.10-alpine
    command: ["-config", "/etc/nats/nats.conf"]
    ports:
      - "${NATS_PORT:-4222}:4222"
      - "8222:8222"
    volumes:
      - ./nats.conf:/etc/nats/nats.conf:ro
      - nats_data:/data/jetstream
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Mock VALR exchange (tick data for daemon) ───────────────────────────
  mock-valr:
    build:
      context: .
      dockerfile: Dockerfile.mock-valr
    ports:
      - "${MOCK_VALR_PORT:-8766}:8766"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8766/v1/public/time', timeout=3)"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── WebTorrent tracker (Trystero WebRTC signaling) ─────────────────────
  tracker:
    build:
      context: ./signaling
      dockerfile: Dockerfile.tracker
    ports:
      - "${TRACKER_PORT:-8888}:8888"
    environment:
      TRACKER_PORT: "8888"
      TRACKER_ALLOW_ALL: "true"
    restart: unless-stopped

  # ── Next.js PHIC dashboard — production build (optional) ─────────────
  dashboard:
    profiles: ["full", "dashboard"]
    build:
      context: ./dashboard
      dockerfile: Dockerfile.dashboard
    ports:
      - "${DASHBOARD_PORT:-3001}:3001"
    environment:
      NEXT_PUBLIC_DAEMON_WS: "ws://host.docker.internal:${DAEMON_IPC_PORT:-8767}"
      NEXT_PUBLIC_BRIDGE_URL: "http://host.docker.internal:${BRIDGE_PORT:-8765}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  # ── Next.js PHIC dashboard — dev mode with hot-reload ─────────────────
  # Usage: docker compose --profile dev up dashboard-dev
  # Source files are bind-mounted so edits to dashboard/src reflect immediately.
  dashboard-dev:
    profiles: ["dev"]
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- -p 3001"
    ports:
      - "${DASHBOARD_PORT:-3001}:3001"
    environment:
      NEXT_PUBLIC_DAEMON_WS: "ws://host.docker.internal:${DAEMON_IPC_PORT:-8767}"
      NEXT_PUBLIC_BRIDGE_URL: "http://host.docker.internal:${BRIDGE_PORT:-8765}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./dashboard:/app
      - dashboard_node_modules:/app/node_modules
    restart: unless-stopped

volumes:
  nats_data:
  dashboard_node_modules:
